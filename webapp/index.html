<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#030206">
  <title>Центр Вселенной</title>
  <link rel="preload" href="/boss-app/assets/boss_phase_1.webp" as="image">
  <link rel="stylesheet" href="/boss-app/style.css?v=8">
  <link rel="stylesheet" href="/boss-app/raid-polish.css?v=8">
  <link rel="stylesheet" href="/boss-app/battle-fx.css?v=8">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root{--battle-dock:92px;--nav-h:74px}
    body{padding-bottom:calc(var(--battle-dock) + var(--nav-h) + env(safe-area-inset-bottom,0px))}
    .resources{grid-template-columns:1fr 1fr!important;padding-inline:16px!important;height:62px!important}.resources .resource{max-width:none!important;height:48px!important}
    .boss-stage{height:min(50vh,430px)!important;min-height:400px!important}.boss-art{top:74px!important;height:calc(100% - 40px)!important;object-position:center 5%!important}.boss-title{top:8px!important}.boss-health{top:45px!important}.phase-card{top:102px!important}.boss-attacks{top:102px!important}.battle-clock{top:208px!important}
    .combat{position:fixed!important;display:grid!important;visibility:visible!important;opacity:1!important;z-index:999!important;left:50%!important;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom,0px))!important;transform:translateX(-50%)!important;width:min(100%,560px)!important;background:linear-gradient(180deg,rgba(20,9,26,.84),rgba(4,2,7,.99) 30%)!important;border-top:1px solid #d39b43!important;box-shadow:0 -14px 34px #000,0 -2px 18px #8f32b744!important;backdrop-filter:blur(13px)!important}
    .main-action{animation:attackPulse 2.6s ease-in-out infinite!important}.main-action:after{content:"";position:absolute;inset:-40% -20%;background:linear-gradient(105deg,transparent 38%,#fff7c466 49%,transparent 59%);transform:translateX(-65%) rotate(3deg);animation:buttonShine 3s ease-in-out infinite;pointer-events:none}@keyframes attackPulse{50%{filter:brightness(1.13);box-shadow:inset 0 0 0 2px #9f3f99,0 0 23px #ce59f56e!important}}@keyframes buttonShine{0%,58%{transform:translateX(-70%) rotate(3deg)}88%,100%{transform:translateX(70%) rotate(3deg)}}
    .app{padding-bottom:calc(var(--battle-dock) + var(--nav-h) + 24px)!important}.bottom-nav{height:calc(var(--nav-h) + env(safe-area-inset-bottom,0px))!important}
    @media(max-height:780px){.boss-stage{height:400px!important;min-height:390px!important}.boss-art{height:355px!important}.phase-card,.boss-attacks{transform:scale(.82)!important;transform-origin:top}.phase-card{left:1px!important}.boss-attacks{right:1px!important}.raid-badge{display:none!important}}
    @media(max-width:370px){.resources{padding-inline:8px!important}.boss-title h1{font-size:20px!important}.boss-stage{min-height:385px!important}}
  </style>
</head>
<body>
  <div class="ambient" aria-hidden="true"></div>
  <main class="app" id="app">
    <header class="resources" aria-label="Состояние боя">
      <div class="resource resource-party"><span class="resource-gem purple"><svg><use href="/boss-app/assets/icons.svg#bolt"/></svg></span><span><b id="partyCount">0/4</b><small>ОТРЯД</small></span></div>
      <div class="resource resource-damage"><span class="resource-gem gold"><svg><use href="/boss-app/assets/icons.svg#crown"/></svg></span><span><b id="score">0</b><small>ВАШ УРОН</small></span></div>
    </header>
    <section class="boss-stage" id="bossStage" aria-label="Битва с Центром Вселенной">
      <img class="boss-art" id="bossImage" src="/boss-app/assets/boss_phase_1.webp" alt="Центр Вселенной">
      <div class="stage-shade" aria-hidden="true"></div><div class="boss-rings" aria-hidden="true"></div><div class="boss-mist" aria-hidden="true"></div>
      <div class="battle-atmosphere" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
      <div class="boss-title"><i></i><svg><use href="/boss-app/assets/icons.svg#sigil"/></svg><h1>ЦЕНТР ВСЕЛЕННОЙ</h1><i></i></div>
      <button class="help-button" data-open-help aria-label="Инструкция и об игре">?</button>
      <div class="boss-health"><div class="hp-shell"><div class="hp-fill" id="bossHpFill"></div><strong id="bossHpText">Загрузка боя…</strong><em id="bossPercent">—</em></div><div class="attack-timer">До следующей атаки: <b id="nextAction">—</b></div></div>
      <aside class="phase-card"><small>ФАЗА</small><b id="phaseText">—/4</b><em id="phaseName">Пробуждение</em></aside>
      <aside class="boss-attacks"><strong>АТАКИ БОССА</strong><span><svg><use href="/boss-app/assets/icons.svg#vortex"/></svg><i><b>Сарказм</b><small>Ослабляет удары</small></i></span><span><svg><use href="/boss-app/assets/icons.svg#shield"/></svg><i><b>Щит ЧСВ</b><small id="shieldText">проверка…</small></i></span><span><svg><use href="/boss-app/assets/icons.svg#crossed-swords"/></svg><i><b>Эффект</b><small id="effectText">нет</small></i></span></aside>
      <div class="battle-clock"><svg><use href="/boss-app/assets/icons.svg#clock"/></svg><span>ДО КОНЦА <b id="battleTimer">--:--</b></span></div><div class="raid-badge"><svg><use href="/boss-app/assets/icons.svg#skull"/></svg><b>РЕЙДОВЫЙ</b><small>БОСС</small></div>
      <div class="boss-warning" id="bossWarning">⚠ БОСС ГОТОВИТ АТАКУ</div><div class="phase-transition" id="phaseTransition">ФАЗА II</div><div class="damage-pop" id="damagePop" aria-live="polite"></div><div class="hit-flash" id="hitFlash" aria-hidden="true"></div>
    </section>
    <section class="squad-section" id="squadSection"><div class="section-head"><div class="section-title"><i></i><span>ОТРЯД ГЕРОЕВ</span><i></i></div><button data-modal="heroes">СМОТРЕТЬ ВСЕХ</button></div><div class="squad" id="fighters"><div class="loading-card">Собираем отряд…</div></div></section>
    <section class="combat" aria-label="Действия игрока"><button class="side-action defend" data-action="defend"><span class="action-glyph"><svg><use href="/boss-app/assets/icons.svg#shield"/></svg></span><b>ЗАЩИТА</b><small>Снижает урон</small><em id="defendCooldown">ГОТОВО</em></button><button class="main-action" data-action="hit"><span class="button-sparks" aria-hidden="true"></span><b>ЗАДЕТЬ ЭГО</b><small id="attackHint">НАНЕСТИ УДАР</small><i class="cooldown-fill" id="attackCooldown"></i></button><button class="side-action heal" data-action="heal"><span class="action-glyph"><svg><use href="/boss-app/assets/icons.svg#heal"/></svg></span><b>ЛЕЧЕНИЕ</b><small>Восстановить HP</small><em id="healCooldown">ГОТОВО</em></button></section>
    <button class="ability-card" data-action="ability"><span class="ability-icon"><svg><use href="/boss-app/assets/icons.svg#vortex"/></svg></span><span class="ability-copy"><small>СПОСОБНОСТЬ РОЛИ</small><b id="abilityName">ПРОБУЖДЕНИЕ ГЕРОЯ</b><em id="abilityHint">Особая атака вашей роли</em></span><span class="ability-cooldown"><small>КУЛДАУН</small><b id="abilityCooldown">ГОТОВО</b></span></button>
    <section class="battle-log" id="battleLog"><div class="section-title"><i></i><span>ХРОНИКА БОЯ</span><i></i></div><div class="log-list" id="logs"><div>Бой загружается…</div></div><button class="full-log" data-scroll="battleLog">ПОЛНАЯ ХРОНИКА</button></section><div class="bottom-space"></div>
  </main>
  <div class="fx-shield" aria-hidden="true"></div><div class="fx-heal" aria-hidden="true"></div>
  <nav class="bottom-nav" aria-label="Навигация"><button class="active" data-scroll="bossStage"><svg><use href="/boss-app/assets/icons.svg#crossed-swords"/></svg><small>РЕЙД</small></button><button data-modal="heroes"><svg><use href="/boss-app/assets/icons.svg#helmet"/></svg><small>ГЕРОИ</small></button><button data-modal="inventory"><svg><use href="/boss-app/assets/icons.svg#bag"/></svg><small>ИНВЕНТАРЬ</small></button><button data-modal="shop"><svg><use href="/boss-app/assets/icons.svg#shop"/></svg><small>МАГАЗИН</small><i class="notice"></i></button><button data-modal="rating"><svg><use href="/boss-app/assets/icons.svg#trophy"/></svg><small>РЕЙТИНГ</small></button></nav>
  <div class="modal" id="modal" aria-hidden="true" role="dialog" aria-modal="true"><section class="modal-card"><button class="modal-close" id="closeModal" aria-label="Закрыть"><svg><use href="/boss-app/assets/icons.svg#close"/></svg></button><div id="modalContent"></div></section></div><div class="toast" id="toast" role="status" aria-live="polite"></div><div class="error-screen" id="errorScreen" hidden><svg><use href="/boss-app/assets/icons.svg#skull"/></svg><h2>БИТВА НЕДОСТУПНА</h2><p id="errorText"></p><button id="retryButton">ПОВТОРИТЬ</button></div>
  <script src="/boss-app/app.js?v=8"></script><script src="/boss-app/battle-fx.js?v=8"></script>
</body>
</html>
