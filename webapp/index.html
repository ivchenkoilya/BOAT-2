<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#030206">
  <title>Центр Вселенной</title>
  <link rel="preload" href="/boss-app/assets/boss_phase_1.webp" as="image">
  <link rel="stylesheet" href="/boss-app/style.css?v=3">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="ambient" aria-hidden="true"></div>
  <main class="app" id="app">
    <header class="resources" aria-label="Состояние боя">
      <div class="resource resource-party"><span class="resource-gem purple"><svg><use href="/boss-app/assets/icons.svg#bolt"/></svg></span><span><b id="partyCount">0/4</b><small>ОТРЯД</small></span></div>
      <div class="resource resource-damage"><span class="resource-gem gold"><svg><use href="/boss-app/assets/icons.svg#crown"/></svg></span><span><b id="score">0</b><small>ВАШ УРОН</small></span></div>
      <button class="resource resource-shop" data-modal="shop"><span class="resource-gem violet"><svg><use href="/boss-app/assets/icons.svg#crystal"/></svg></span><span><b>МАГАЗИН</b><small>СКОРО</small></span><i class="plus">+</i></button>
    </header>

    <section class="boss-stage" id="bossStage" aria-label="Битва с Центром Вселенной">
      <img class="boss-art" id="bossImage" src="/boss-app/assets/boss_phase_1.webp" alt="Центр Вселенной">
      <div class="stage-shade" aria-hidden="true"></div>
      <div class="boss-title"><i></i><svg><use href="/boss-app/assets/icons.svg#sigil"/></svg><h1>ЦЕНТР ВСЕЛЕННОЙ</h1><i></i></div>
      <div class="boss-health"><div class="hp-shell"><div class="hp-fill" id="bossHpFill"></div><strong id="bossHpText">Загрузка боя…</strong><em id="bossPercent">—</em></div><div class="attack-timer">До следующей атаки: <b id="nextAction">—</b></div></div>

      <aside class="phase-card"><small>ФАЗА</small><b id="phaseText">—/4</b><em id="phaseName">Пробуждение</em></aside>
      <aside class="boss-attacks">
        <strong>АТАКИ БОССА</strong>
        <span><svg><use href="/boss-app/assets/icons.svg#vortex"/></svg><i><b>Сарказм</b><small>Ослабляет удары</small></i></span>
        <span><svg><use href="/boss-app/assets/icons.svg#shield"/></svg><i><b>Щит ЧСВ</b><small id="shieldText">проверка…</small></i></span>
        <span><svg><use href="/boss-app/assets/icons.svg#crossed-swords"/></svg><i><b>Эффект</b><small id="effectText">нет</small></i></span>
      </aside>
      <div class="battle-clock"><svg><use href="/boss-app/assets/icons.svg#clock"/></svg><span>ДО КОНЦА <b id="battleTimer">--:--</b></span></div>
      <div class="raid-badge"><svg><use href="/boss-app/assets/icons.svg#skull"/></svg><b>РЕЙДОВЫЙ</b><small>БОСС</small></div>
      <div class="damage-pop" id="damagePop" aria-live="polite"></div><div class="hit-flash" id="hitFlash" aria-hidden="true"></div>
    </section>

    <section class="squad-section" id="squadSection"><div class="section-head"><div class="section-title"><i></i><span>ОТРЯД ГЕРОЕВ</span><i></i></div><button data-modal="heroes">СМОТРЕТЬ ВСЕХ</button></div><div class="squad" id="fighters"><div class="loading-card">Собираем отряд…</div></div></section>

    <section class="combat" aria-label="Действия игрока">
      <button class="side-action defend" data-action="defend"><span class="action-glyph"><svg><use href="/boss-app/assets/icons.svg#shield"/></svg></span><b>ЗАЩИТА</b><small>Снижает урон</small><em id="defendCooldown">ГОТОВО</em></button>
      <button class="main-action" data-action="hit"><span class="button-sparks" aria-hidden="true"></span><b>ЗАДЕТЬ ЭГО</b><small id="attackHint">НАНЕСТИ УДАР</small><i class="cooldown-fill" id="attackCooldown"></i></button>
      <button class="side-action heal" data-action="heal"><span class="action-glyph"><svg><use href="/boss-app/assets/icons.svg#heal"/></svg></span><b>ЛЕЧЕНИЕ</b><small>Восстановить HP</small><em id="healCooldown">ГОТОВО</em></button>
    </section>

    <button class="ability-card" data-action="ability"><span class="ability-icon"><svg><use href="/boss-app/assets/icons.svg#vortex"/></svg></span><span class="ability-copy"><small>СПОСОБНОСТЬ РОЛИ</small><b id="abilityName">ПРОБУЖДЕНИЕ ГЕРОЯ</b><em id="abilityHint">Особая атака вашей роли</em></span><span class="ability-cooldown"><small>КУЛДАУН</small><b id="abilityCooldown">ГОТОВО</b></span></button>

    <section class="battle-log" id="battleLog"><div class="section-title"><i></i><span>ХРОНИКА БОЯ</span><i></i></div><div class="log-list" id="logs"><div>Бой загружается…</div></div><button class="full-log" data-scroll="battleLog">ПОЛНАЯ ХРОНИКА</button></section>
    <div class="bottom-space"></div>
  </main>

  <nav class="bottom-nav" aria-label="Навигация"><button class="active" data-scroll="bossStage"><svg><use href="/boss-app/assets/icons.svg#crossed-swords"/></svg><small>РЕЙД</small></button><button data-modal="heroes"><svg><use href="/boss-app/assets/icons.svg#helmet"/></svg><small>ГЕРОИ</small></button><button data-modal="inventory"><svg><use href="/boss-app/assets/icons.svg#bag"/></svg><small>ИНВЕНТАРЬ</small></button><button data-modal="shop"><svg><use href="/boss-app/assets/icons.svg#shop"/></svg><small>МАГАЗИН</small><i class="notice"></i></button><button data-modal="rating"><svg><use href="/boss-app/assets/icons.svg#trophy"/></svg><small>РЕЙТИНГ</small></button></nav>

  <div class="modal" id="modal" aria-hidden="true" role="dialog" aria-modal="true"><section class="modal-card"><button class="modal-close" id="closeModal" aria-label="Закрыть"><svg><use href="/boss-app/assets/icons.svg#close"/></svg></button><div id="modalContent"></div></section></div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <div class="error-screen" id="errorScreen" hidden><svg><use href="/boss-app/assets/icons.svg#skull"/></svg><h2>БИТВА НЕДОСТУПНА</h2><p id="errorText"></p><button id="retryButton">ПОВТОРИТЬ</button></div>
  <script src="/boss-app/app.js?v=3"></script>
</body>
</html>
