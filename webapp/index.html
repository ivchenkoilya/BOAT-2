<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#07050b">
  <title>Центр Вселенной</title>
  <link rel="stylesheet" href="/boss-app/style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="stars" aria-hidden="true"></div>
  <main class="app">
    <header class="topbar">
      <div class="resource"><span>⚡</span><b id="energy">3/5</b><small id="battleTimer">--:--</small></div>
      <div class="resource crown"><span>♛</span><b id="score">0</b></div>
      <button class="resource gem" id="shopTop"><span>◆</span><b>Магазин</b></button>
    </header>

    <section class="boss-stage" id="bossStage">
      <div class="boss-heading"><span>✦</span><h1>ЦЕНТР ВСЕЛЕННОЙ</h1><span>✦</span></div>
      <div class="hp-wrap">
        <div class="hp-bar"><i id="bossHpFill"></i><strong id="bossHpText">Загрузка боя…</strong><em id="bossPercent">—</em></div>
        <div class="next-hit">До следующей атаки: <b id="nextAction">—</b></div>
      </div>
      <div class="phase-badge"><small>ФАЗА</small><b id="phaseText">—/4</b></div>
      <img class="boss-image" id="bossImage" src="/boss-app/assets/boss_phase_1.webp" alt="Центр Вселенной">
      <div class="boss-glow"></div>
    </section>

    <section class="squad-section">
      <div class="section-caption"><span></span>ОТРЯД ГЕРОЕВ<span></span></div>
      <div class="squad" id="fighters"></div>
    </section>

    <section class="combat">
      <button class="side-action defend" data-action="defend"><span class="action-icon">⬡</span><b>ЗАЩИТА</b><small id="defendCooldown">готово</small></button>
      <button class="main-action" data-action="hit"><span>ЗАДЕТЬ ЭГО</span><small id="attackHint">нанести удар</small><i id="attackCooldown"></i></button>
      <button class="side-action heal" data-action="heal"><span class="action-icon">✚</span><b>ЛЕЧЕНИЕ</b><small id="healCooldown">готово</small></button>
    </section>

    <button class="ability-card" data-action="ability">
      <span class="ability-orb">✦</span>
      <span class="ability-copy"><small>СПОСОБНОСТЬ РОЛИ</small><b id="abilityName">Пробуждение героя</b><em id="abilityHint">Особая атака вашей роли</em></span>
      <span class="cooldown"><small>КУЛДАУН</small><b id="abilityCooldown">готово</b></span>
    </button>

    <section class="battle-log"><div class="section-caption"><span></span>ХРОНИКА БОЯ<span></span></div><div id="logs"></div></section>
    <div class="spacer"></div>
  </main>

  <nav class="nav">
    <button class="active" data-scroll="bossStage"><span>⚔</span><small>РЕЙД</small></button>
    <button data-scroll="fighters"><span>♜</span><small>ГЕРОИ</small></button>
    <button id="inventory"><span>🎒</span><small>ИНВЕНТАРЬ</small></button>
    <button id="shop"><span>▣</span><small>МАГАЗИН</small><i></i></button>
    <button data-scroll="logs"><span>🏆</span><small>РЕЙТИНГ</small></button>
  </nav>

  <div class="modal" id="modal" aria-hidden="true">
    <div class="modal-card">
      <button class="close" id="closeModal">×</button>
      <div class="shop-icon">🛒</div><small>ЦЕНТР ВСЕЛЕННОЙ</small><h2 id="modalTitle">МАГАЗИН</h2><p id="modalText">В РАЗРАБОТКЕ</p>
      <div class="coming-line"><span></span><b>СКОРО</b><span></span></div>
    </div>
  </div>
  <div class="toast" id="toast"></div>
  <script src="/boss-app/app.js"></script>
</body>
</html>
