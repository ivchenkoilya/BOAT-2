name: Reality 177-180 checks

on:
  push:
    paths:
      - "government_reality_v177*.py"
      - "governmentapp_v127/reality-v177.*"
      - "unlimited_transfers_v178.py"
      - "government_reality_v179*.py"
      - "governmentapp_v127/reality-v179.*"
      - "government_reality_v180*.py"
      - "governmentapp_v127/reality-v180-map.*"
      - "tests/test_government_reality_v177_static.py"
      - "tests/test_unlimited_transfers_v178_static.py"
      - "tests/test_government_reality_v179_static.py"
      - "tests/test_government_reality_v180_map.py"
      - "talent_entry_v164.py"
      - ".github/workflows/reality177-check.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check Python syntax
        run: |
          python -m py_compile \
            government_reality_v177.py \
            government_reality_v177_api.py \
            government_reality_v177_common.py \
            government_reality_v177_funds.py \
            government_reality_v177_programs.py \
            government_reality_v177_property.py \
            government_reality_v177_property_actions.py \
            government_reality_v177_property_auctions.py \
            government_reality_v177_property_state.py \
            government_reality_v177_ratings.py \
            government_reality_v177_safety.py \
            unlimited_transfers_v178.py \
            government_reality_v179.py \
            government_reality_v179_common.py \
            government_reality_v179_treasury.py \
            government_reality_v179_trust.py \
            government_reality_v179_construction.py \
            government_reality_v179_construction_core.py \
            government_reality_v179_construction_actions.py \
            government_reality_v179_construction_runtime.py \
            government_reality_v179_safety.py \
            government_reality_v180.py \
            government_reality_v180_common.py \
            government_reality_v180_map.py \
            talent_entry_v164.py \
            tests/test_government_reality_v177_static.py \
            tests/test_unlimited_transfers_v178_static.py \
            tests/test_government_reality_v179_static.py \
            tests/test_government_reality_v180_map.py
      - name: Check JavaScript syntax
        run: |
          node --check governmentapp_v127/reality-v177.js
          node --check governmentapp_v127/reality-v179.js
          node --check governmentapp_v127/reality-v180-map.js
      - name: Run Reality 177-180 static and SQLite tests
        run: |
          python -m unittest \
            tests.test_government_reality_v177_static \
            tests.test_unlimited_transfers_v178_static \
            tests.test_government_reality_v179_static \
            tests.test_government_reality_v180_map -v
