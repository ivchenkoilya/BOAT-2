name: Validate Reality 103

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Validate Python
        run: python -m py_compile hero_loadouts_v103.py hero_loadouts_v103_fix.py hero_skins_sync_v100.py talent_entry.py webapp_inline_fix.py
      - name: Validate JavaScript
        run: node --check webapp/hero-loadouts-v103.js && node --check webapp/hero-skins-sync-v100.js
